<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ASCENT-LITE // ARCHITECT EDITION</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --vandal: #ff4655; --accent: #00f2ff; --blue: #0088ff; --glass: rgba(10, 15, 20, 0.95); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: white; user-select: none; }
        
        /* OVERLAY / MENU */
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        #menu { 
            position: fixed; inset: 0; background: radial-gradient(circle, #1a232e 0%, #050a10 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; pointer-events: all;
        }
        .v-card { background: var(--glass); padding: 50px; border: 1px solid rgba(255,255,255,0.1); width: 450px; text-align: center; border-radius: 2px; }
        .v-input { width: 100%; padding: 15px; background: #0a0f14; border: 1px solid var(--accent); color: white; font-family: 'Orbitron'; margin-bottom: 20px; box-sizing: border-box; }
        .v-btn { width: 100%; padding: 20px; margin: 5px 0; border: none; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; transition: 0.2s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); }
        .v-btn-red { background: var(--vandal); color: white; }
        .v-btn-blue { background: var(--blue); color: white; }
        .v-btn:hover { filter: brightness(1.3); transform: translateY(-2px); }

        /* HUD */
        #hud { position: absolute; inset: 0; display: none; }
        .score-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: var(--glass); padding: 10px 60px; display: flex; gap: 40px; border-bottom: 3px solid var(--accent); font-family: 'Orbitron'; font-size: 32px; }
        .bottom-hud { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; }
        .hp-cont { width: 350px; }
        #hp-bar { height: 12px; background: var(--accent); width: 100%; transition: 0.3s; box-shadow: 0 0 15px var(--accent); }
        .ammo-cont { text-align: right; border-right: 6px solid var(--vandal); padding-right: 20px; }
        
        /* COMBAT UI */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; }
        .ch-l { position: absolute; background: #0f0; box-shadow: 0 0 5px #0f0; }
        #killfeed { position: absolute; top: 120px; right: 30px; display: flex; flex-direction: column; gap: 5px; }
        .kill-node { background: var(--glass); padding: 10px 20px; border-left: 4px solid var(--vandal); font-weight: bold; animation: kf-in 0.3s forwards; }
        @keyframes kf-in { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        
        #vignette { position: fixed; inset: 0; pointer-events: none; transition: 0.3s; }
        #hit-marker { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: white; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <div id="hit-marker">╳</div>

    <div id="menu">
        <h1 style="font-family: 'Orbitron'; letter-spacing: 10px; color: var(--accent);">ASCENT-LITE</h1>
        <div class="v-card">
            <input type="text" id="nickInput" class="v-input" placeholder="AGENT NAME..." maxlength="12">
            <button class="v-btn v-btn-red" onclick="initGame('RED')">JOIN TEAM RED</button>
            <button class="v-btn v-btn-blue" onclick="initGame('BLUE')">JOIN TEAM BLUE</button>
            <p style="font-size: 12px; color: #555; margin-top: 20px;">WASD: MOVE | SHIFT: WALK | CTRL: CROUCH | LEFT-CLICK: FIRE</p>
        </div>
    </div>

    <div id="hud">
        <div class="score-top">
            <span id="sRed" style="color: var(--vandal)">0</span>
            <span style="color: #333">/</span>
            <span id="sBlue" style="color: var(--blue)">0</span>
        </div>
        
        <div id="killfeed"></div>
        
        <div id="crosshair">
            <div class="ch-l" style="width:2px; height:8px; left:9px; top:0;"></div>
            <div class="ch-l" style="width:2px; height:8px; left:9px; bottom:0;"></div>
            <div class="ch-l" style="width:8px; height:2px; left:0; top:9px;"></div>
            <div class="ch-l" style="width:8px; height:2px; right:0; top:9px;"></div>
        </div>

        <div class="bottom-hud">
            <div class="hp-cont">
                <div id="hpText" style="font-size: 48px; font-weight: 800;">100</div>
                <div style="background: rgba(255,255,255,0.1);"><div id="hp-bar"></div></div>
            </div>
            <div class="ammo-cont">
                <div style="font-size: 12px; color: var(--vandal);">VANDAL // CAL. 7.62</div>
                <div style="font-size: 64px; font-weight: 800;">25<span style="font-size: 24px; color: #444">/75</span></div>
            </div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ENGINE CONSTANTS ---
        const CONFIG = {
            SENS: 0.002,
            GRAVITY: -28,
            WALK_SPD: 4.5,
            RUN_SPD: 7.2,
            JUMP_FORCE: 9,
            RENDER_URL: 'https://onev1patrysoy.onrender.com',
            SPAWN_RED: { x: 20, y: 1.7, z: 20 },
            SPAWN_BLUE: { x: -20, y: 1.7, z: -20 }
        };

        class GameCore {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.01, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.clock = new THREE.Clock();
                this.socket = io(CONFIG.RENDER_URL);
                
                this.entities = { players: {}, enemies: {}, bullets: [] };
                this.player = { 
                    pos: new THREE.Vector3(), vel: new THREE.Vector3(),
                    rot: { y: 0, p: 0 }, keys: {}, health: 100,
                    isCrouching: false, isGrounded: true, lastFire: 0,
                    recoil: { p: 0, y: 0 }, shake: 0
                };

                this.initGraphics();
                this.initLevel();
                this.initWeapon();
                this.initNetwork();
                this.animate();
            }

            initGraphics() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                this.scene.background = new THREE.Color(0x06080a);
                this.scene.fog = new THREE.Fog(0x06080a, 5, 55);

                const amb = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(amb);

                const dir = new THREE.DirectionalLight(0xffffff, 1.5);
                dir.position.set(10, 20, 10);
                dir.castShadow = true;
                this.scene.add(dir);
            }

            initLevel() {
                // Ground
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ color: 0x12151a }));
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);
                this.scene.add(new THREE.GridHelper(100, 40, 0x222222, 0x111111));

                // Map Walls (Ascent Style)
                const wallMat = new THREE.MeshStandardMaterial({ color: 0x24292e });
                const addWall = (w, h, d, x, y, z) => {
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                    wall.position.set(x, y, z);
                    wall.castShadow = true;
                    this.scene.add(wall);
                };

                addWall(30, 4, 1, 0, 2, 15); // Back Wall
                addWall(1, 4, 30, 15, 2, 0); // Side Wall
                addWall(4, 2, 4, 5, 1, 5);   // Mid Box
                addWall(2, 4, 2, -10, 2, -5); // Pillar
            }

            initWeapon() {
                this.weapon = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.5), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.4), new THREE.MeshStandardMaterial({ color: 0x000000 }));
                barrel.rotation.x = Math.PI/2; barrel.position.z = -0.4;
                this.weapon.add(body, barrel);
                
                this.weapon.position.set(0.3, -0.25, -0.4);
                this.camera.add(this.weapon);
                this.scene.add(this.camera);
            }

            initNetwork() {
                this.socket.on('init', (d) => {
                    this.myId = d.id;
                    Object.keys(d.players).forEach(id => { if(id !== this.myId) this.spawnEnemy(d.players[id]); });
                    this.updateScoreUI(d.scores);
                });
                this.socket.on('newPlayer', (d) => this.spawnEnemy(d.player));
                this.socket.on('updatePlayer', (d) => {
                    const enemy = this.entities.enemies[d.id];
                    if(enemy) {
                        enemy.position.lerp(new THREE.Vector3(d.pos.x, d.pos.y - (d.isCrouching ? 2.2 : 1.7), d.pos.z), 0.2);
                        enemy.rotation.y = d.rot.y;
                    }
                });
                this.socket.on('playerHit', (d) => { if(d.id === this.myId) this.handleDamage(d.health); });
                this.socket.on('playerDead', (d) => this.handleDeath(d));
                this.socket.on('removePlayer', (id) => {
                    if(this.entities.enemies[id]) { this.scene.remove(this.entities.enemies[id]); delete this.entities.enemies[id]; }
                });
            }

            spawnEnemy(data) {
                const group = new THREE.Group();
                const col = data.team === 'RED' ? 0xff4655 : 0x0088ff;
                
                // Body
                const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.2 }));
                body.position.y = 1;
                group.add(body);

                // Headshot Box (Invisible but Raycastable)
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({ visible: false }));
                head.position.y = 1.9;
                head.userData = { type: 'head', id: data.id };
                group.add(head);

                // Name tag
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.font = 'bold 30px Orbitron'; ctx.fillStyle = 'white';
                ctx.fillText(data.name, 0, 40);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
                sprite.position.y = 2.4; sprite.scale.set(1.5, 0.75, 1);
                group.add(sprite);

                group.userData = { id: data.id, team: data.team };
                this.scene.add(group);
                this.entities.enemies[data.id] = group;
            }

            handleDamage(hp) {
                this.player.health = hp;
                this.player.shake = 0.1;
                document.getElementById('hpText').innerText = hp;
                document.getElementById('hp-bar').style.width = hp + "%";
                document.getElementById('vignette').style.boxShadow = "inset 0 0 100px rgba(255, 70, 85, 0.8)";
                setTimeout(() => document.getElementById('vignette').style.boxShadow = "none", 200);
            }

            handleDeath(d) {
                const kf = document.getElementById('killfeed');
                const div = document.createElement('div');
                div.className = 'kill-node';
                div.innerHTML = `<span style="color:var(--vandal)">${d.killerName}</span> ${d.isHeadshot ? '🎯' : '🔫'} ${d.victimName}`;
                kf.prepend(div); setTimeout(() => div.remove(), 4000);
                this.updateScoreUI(d.scores);

                if(d.victim === this.myId) {
                    const spawn = this.myTeam === 'RED' ? CONFIG.SPAWN_RED : CONFIG.SPAWN_BLUE;
                    this.player.pos.copy(spawn);
                    this.handleDamage(100);
                }
            }

            updateScoreUI(s) {
                document.getElementById('sRed').innerText = s.RED;
                document.getElementById('sBlue').innerText = s.BLUE;
            }

            shoot() {
                if(Date.now() - this.player.lastFire < 100) return;
                this.player.lastFire = Date.now();
                
                // Spray & Recoil
                this.player.recoil.p += 0.05;
                this.player.recoil.y += (Math.random() - 0.5) * 0.02;

                // Tracer
                const ray = new THREE.Raycaster();
                ray.setFromCamera({ x: 0, y: 0 }, this.camera);
                
                const start = new THREE.Vector3(); this.weapon.getWorldPosition(start);
                const end = ray.ray.direction.clone().multiplyScalar(50).add(start);
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([start, end]), new THREE.LineBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.6 }));
                this.scene.add(line); setTimeout(() => this.scene.remove(line), 40);

                // Raycast Hit Detection
                const intersects = ray.intersectObjects(Object.values(this.entities.enemies), true);
                if(intersects.length > 0) {
                    let hitObj = intersects[0].object;
                    let isHS = hitObj.userData.type === 'head';
                    
                    // Find root id
                    let targetId = hitObj.userData.id;
                    let temp = hitObj;
                    while(!targetId && temp.parent) { temp = temp.parent; targetId = temp.userData.id; }

                    if(targetId && targetId !== this.myId) {
                        this.socket.emit('hit', { targetId, isHeadshot: isHS });
                        this.showHitmarker(isHS);
                    }
                }
            }

            showHitmarker(hs) {
                const hm = document.getElementById('hit-marker');
                hm.style.color = hs ? 'gold' : 'white';
                hm.style.display = 'block';
                setTimeout(() => hm.style.display = 'none', 100);
            }

            update(dt) {
                if(!this.isLive) return;
                
                const p = this.player;
                const speed = p.keys['ControlLeft'] ? 2 : (p.keys['ShiftLeft'] ? CONFIG.WALK_SPD : CONFIG.RUN_SPD);
                
                // Move logic
                const inputDir = new THREE.Vector3();
                if(p.keys['KeyW']) inputDir.z -= 1; if(p.keys['KeyS']) inputDir.z += 1;
                if(p.keys['KeyA']) inputDir.x -= 1; if(p.keys['KeyD']) inputDir.x += 1;
                inputDir.normalize().applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), p.rot.y));
                
                p.vel.x = inputDir.x * speed;
                p.vel.z = inputDir.z * speed;
                
                // Gravity
                p.vel.y += CONFIG.GRAVITY * dt;
                if(p.isGrounded && p.keys['Space']) { p.vel.y = CONFIG.JUMP_FORCE; p.isGrounded = false; }
                
                p.pos.addScaledVector(p.vel, dt);
                
                // Floor Collision
                const camH = p.keys['ControlLeft'] ? 1.0 : 1.7;
                if(p.pos.y < camH) { p.pos.y = camH; p.vel.y = 0; p.isGrounded = true; }

                // Recoil Recovery & Shake
                p.recoil.p *= 0.9; p.recoil.y *= 0.9; p.shake *= 0.9;
                
                const shakeOff = new THREE.Vector3((Math.random()-0.5)*p.shake, (Math.random()-0.5)*p.shake, 0);
                this.camera.rotation.set(p.rot.p + p.recoil.p, p.rot.y + p.recoil.y, 0, 'YXZ');
                this.camera.position.copy(p.pos).add(shakeOff);
                
                // Weapon Sway
                const sway = Math.sin(Date.now() * 0.005) * 0.005;
                this.weapon.position.y = -0.25 + (p.keys['ControlLeft'] ? -0.1 : sway);

                if(this.myId) this.socket.emit('move', { pos: p.pos, rot: p.rot, isCrouching: p.keys['ControlLeft'] });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const dt = Math.min(this.clock.getDelta(), 0.1);
                this.update(dt);
                this.renderer.render(this.scene, this.camera);
            }
        }

        const Engine = new GameCore();

        window.initGame = (team) => {
            const nick = document.getElementById('nickInput').value || "Agent";
            Engine.myTeam = team;
            Engine.isLive = true;
            Engine.player.pos.copy(team === 'RED' ? CONFIG.SPAWN_RED : CONFIG.SPAWN_BLUE);
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.body.requestPointerLock();
            Engine.socket.emit('join', { name: nick, team: team });
        };

        // Input Bindings
        document.addEventListener('keydown', (e) => Engine.player.keys[e.code] = true);
        document.addEventListener('keyup', (e) => Engine.player.keys[e.code] = false);
        document.addEventListener('mousedown', (e) => {
            if(document.pointerLockElement) Engine.shoot();
            else if(Engine.isLive) document.body.requestPointerLock();
        });
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                Engine.player.rot.y -= e.movementX * CONFIG.SENS;
                Engine.player.rot.p -= e.movementY * CONFIG.SENS;
                Engine.player.rot.p = Math.max(-Math.PI/2, Math.min(Math.PI/2, Engine.player.rot.p));
            }
        });
    </script>
</body>
</html>
