<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ASCENT-LITE // TEAM TACTICS</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --vandal: #ff4655; --accent: #00f2ff; --blue: #0088ff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: white; }
        
        /* FULLSCREEN MENU */
        #overlay {
            position: fixed; inset: 0; background: rgba(10, 15, 20, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        .menu-card {
            background: rgba(255,255,255,0.05); padding: 40px; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1); width: 400px; text-align: center;
        }
        input {
            width: 100%; padding: 12px; background: #1a2026; border: 1px solid var(--accent);
            color: white; font-family: 'Orbitron'; margin-bottom: 20px; box-sizing: border-box;
        }
        .team-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .t-btn { 
            flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; 
            font-family: 'Orbitron'; transition: 0.3s;
        }
        .btn-a { background: var(--vandal); color: white; }
        .btn-b { background: var(--blue); color: white; }
        .t-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; display: none; }
        .score-bar { 
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); display: flex; gap: 30px; padding: 10px 40px;
            border-bottom: 3px solid var(--accent); font-family: 'Orbitron'; font-size: 24px;
        }
        .hp-box { position: absolute; bottom: 40px; left: 40px; width: 300px; }
        #hp-bar { height: 10px; background: var(--accent); transition: 0.3s; }
        
        /* KILLFEED & NAMEPLATES */
        #killfeed { position: absolute; top: 100px; right: 20px; text-align: right; }
        .kill-entry { background: var(--vandal); padding: 5px 15px; margin-bottom: 5px; font-weight: bold; }
        .nameplate { position: absolute; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; }
    </style>
</head>
<body>

    <!-- GİRİŞ MENÜSÜ -->
    <div id="overlay">
        <h1 style="font-family: 'Orbitron'; color: var(--accent); margin-bottom: 40px;">ASCENT // COMPETITIVE</h1>
        <div class="menu-card">
            <input type="text" id="nickInput" placeholder="NICKNAME GIRINIZ..." maxlength="12">
            <div style="margin-bottom: 10px; font-weight: bold; color: #aaa;">TAKIM SEÇ</div>
            <div class="team-btns">
                <button class="t-btn btn-a" onclick="joinGame('A')">TEAM RED</button>
                <button class="t-btn btn-b" onclick="joinGame('B')">TEAM BLUE</button>
            </div>
            <p style="font-size: 12px; color: #666;">W-A-S-D: Hareket | Mouse: Ateş | Sağ Tık: Zoom</p>
        </div>
    </div>

    <div id="hud">
        <div class="score-bar">
            <span style="color: var(--vandal)">RED: <span id="scoreA">0</span></span>
            <span style="color: var(--blue)">BLUE: <span id="scoreB">0</span></span>
        </div>
        <div id="killfeed"></div>
        <div class="hp-box">
            <div id="hp-text" style="font-size: 32px; font-weight: bold; margin-bottom: 5px;">100</div>
            <div style="background: rgba(255,255,255,0.1);"><div id="hp-bar"></div></div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const RENDER_URL = 'https://onev1patrysoy.onrender.com';
        const socket = io(RENDER_URL);

        let myId, myTeam, myName;
        let enemies = {};
        let score = { A: 0, B: 0 };

        // THREE.JS CORE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050a10);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // LIGHTS
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // LEVEL
        scene.add(new THREE.GridHelper(100, 50, 0x444444, 0x222222));
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // MAP OBJECTS
        const boxGeo = new THREE.BoxGeometry(2, 2, 2);
        for(let i=0; i<10; i++) {
            const box = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({ color: 0x333333 }));
            box.position.set(Math.random()*40-20, 1, Math.random()*40-20);
            scene.add(box);
        }

        const player = { pos: new THREE.Vector3(), rot: {y:0, p:0}, keys: {}, health: 100 };

        // SPAWN POINTS
        const SP_TEAM_A = { x: 30, z: 30 };
        const SP_TEAM_B = { x: -30, z: -30 };

        window.joinGame = (team) => {
            myName = document.getElementById('nickInput').value || "Oyuncu";
            myTeam = team;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            // Initial Spawn
            const startPos = team === 'A' ? SP_TEAM_A : SP_TEAM_B;
            player.pos.set(startPos.x, 1.7, startPos.z);
            
            socket.emit('join', { name: myName, team: myTeam });
            requestPointerLock();
        };

        function requestPointerLock() {
            document.body.requestPointerLock();
        }

        function createEnemy(data) {
            const group = new THREE.Group();
            const color = data.team === 'A' ? 0xff4655 : 0x0088ff;
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color: color }));
            body.position.y = 1;
            group.add(body);
            
            // Nameplate (Basit Text Çözümü)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.font = '20px Orbitron';
            ctx.fillText(data.name, 10, 30);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            sprite.position.y = 2.2;
            sprite.scale.set(2, 1, 1);
            group.add(sprite);

            group.userData = { id: data.id, team: data.team };
            scene.add(group);
            enemies[data.id] = group;
        }

        // SOCKET LOGIC
        socket.on('init', (data) => {
            myId = data.id;
            Object.keys(data.players).forEach(id => {
                if(id !== myId) createEnemy(data.players[id]);
            });
        });

        socket.on('newPlayer', (data) => createEnemy(data.player));

        socket.on('updatePlayer', (data) => {
            if(enemies[data.id]) {
                enemies[data.id].position.lerp(new THREE.Vector3(data.pos.x, data.pos.y-1.7, data.pos.z), 0.2);
                enemies[data.id].rotation.y = data.rot.y;
            }
        });

        socket.on('playerDead', (data) => {
            // Killfeed
            const kf = document.getElementById('killfeed');
            kf.innerHTML = `<div class="kill-entry">${data.killer.substring(0,4)} ⚔️ ${data.victim.substring(0,4)}</div>` + kf.innerHTML;
            
            // Score Update
            if(data.victimTeam === 'A') score.B++; else score.A++;
            document.getElementById('scoreA').innerText = score.A;
            document.getElementById('scoreB').innerText = score.B;

            if(data.victim === myId) {
                const respawn = myTeam === 'A' ? SP_TEAM_A : SP_TEAM_B;
                player.pos.set(respawn.x, 1.7, respawn.z);
                player.health = 100;
                updateHealthUI();
            }
        });

        function updateHealthUI() {
            document.getElementById('hp-text').innerText = player.health;
            document.getElementById('hp-bar').style.width = player.health + "%";
        }

        // SHOOTING
        const raycaster = new THREE.Raycaster();
        function shoot() {
            raycaster.setFromCamera({ x: 0, y: 0 }, camera);
            const intersects = raycaster.intersectObjects(Object.values(enemies), true);
            if(intersects.length > 0) {
                let hitObj = intersects[0].object;
                while(hitObj.parent && !hitObj.userData.id) hitObj = hitObj.parent;
                if(hitObj.userData && hitObj.userData.team !== myTeam) {
                    socket.emit('hit', { targetId: hitObj.userData.id });
                }
            }
        }

        // LOOP & CONTROLS
        document.addEventListener('keydown', (e) => player.keys[e.code] = true);
        document.addEventListener('keyup', (e) => player.keys[e.code] = false);
        document.addEventListener('mousedown', (e) => { if(e.button === 0) shoot(); });
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                player.rot.y -= e.movementX * 0.002;
                player.rot.p -= e.movementY * 0.002;
                player.rot.p = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.rot.p));
                camera.rotation.set(player.rot.p, player.rot.y, 0, 'YXZ');
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const move = new THREE.Vector3();
            if(player.keys['KeyW']) move.z -= 0.15;
            if(player.keys['KeyS']) move.z += 0.15;
            if(player.keys['KeyA']) move.x -= 0.15;
            if(player.keys['KeyD']) move.x += 0.15;
            move.applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), player.rot.y));
            player.pos.add(move);
            camera.position.copy(player.pos);
            
            if(myId) socket.emit('move', { pos: player.pos, rot: player.rot });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
