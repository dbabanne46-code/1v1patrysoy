<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCENT-LITE // Competitive Browser FPS</title>
    <style>
        :root {
            --glass: rgba(15, 15, 25, 0.7);
            --accent: #00f2ff;
            --vandal: #ff4655;
        }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
        canvas { display: block; }

        /* HUD - Glassmorphic UI */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; box-sizing: border-box;
        }

        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
        }
        .ch-line { position: absolute; background: var(--accent); }
        .ch-v { width: 2px; height: 10px; left: 9px; }
        .ch-h { width: 10px; height: 2px; top: 9px; }
        .ch-dot { width: 2px; height: 2px; background: #fff; left: 9px; top: 9px; }

        /* Stats & Economy */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .score-box { 
            background: var(--glass); backdrop-filter: blur(10px); 
            padding: 10px 30px; border-radius: 4px; border-bottom: 3px solid var(--accent);
            font-size: 24px; font-weight: bold; letter-spacing: 2px;
        }
        
        .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; }
        .weapon-info { 
            background: var(--glass); padding: 15px; border-radius: 4px; 
            text-align: right; border-right: 4px solid var(--vandal);
        }
        .ammo-main { font-size: 48px; font-weight: 800; line-height: 1; }
        .ammo-res { font-size: 18px; color: #888; }

        #debug { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 12px; color: #0f0; }
        
        /* Hitmarker */
        #hitmarker {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(45deg);
            width: 30px; height: 30px; display: none;
        }
        .hm-line { position: absolute; background: white; }
    </style>
</head>
<body>

    <div id="debug">FPS: 0 | PING: 0ms | POS: 0,0,0</div>
    
    <div id="hud">
        <div class="top-bar">
            <div class="economy">$2,900</div>
            <div class="score-box">12 - 11</div>
            <div class="timer">1:24</div>
        </div>

        <div id="crosshair">
            <div class="ch-line ch-v" style="top: -8px;"></div>
            <div class="ch-line ch-v" style="bottom: -8px;"></div>
            <div class="ch-line ch-h" style="left: -8px;"></div>
            <div class="ch-line ch-h" style="right: -8px;"></div>
            <div class="ch-dot"></div>
        </div>

        <div class="bottom-bar">
            <div class="health-box" style="background: var(--glass); padding: 15px; border-left: 4px solid #0f0;">
                <div style="font-size: 12px; color: #aaa;">HEALTH</div>
                <div style="font-size: 32px; font-weight: bold;">100</div>
            </div>
            <div class="weapon-info">
                <div id="weapon-name" style="font-size: 14px; font-weight: bold;">VANDAL</div>
                <div class="ammo-main">25<span class="ammo-res">/75</span></div>
            </div>
        </div>
    </div>

    <!-- Three.js Library -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        /**
         * ENGINE CONFIGURATION
         */
        const CONFIG = {
            TICK_RATE: 64,
            GRAVITY: -25,
            WALK_SPEED: 5.2,
            SPRINT_SPEED: 7.8,
            ACCEL: 15,
            FRICTION: 8,
            JUMP_FORCE: 8.5,
            MOUSE_SENS: 0.002
        };

        class AscentEngine {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.clock = new THREE.Clock();
                
                this.initGraphics();
                this.initLevel();
                this.initPlayer();
                this.initEventListeners();
                
                this.gameLoop();
            }

            initGraphics() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                document.body.appendChild(this.renderer.domElement);

                this.scene.background = new THREE.Color(0x0a0a12);
                this.scene.fog = new THREE.Fog(0x0a0a12, 10, 50);

                const ambient = new THREE.AmbientLight(0xffffff, 0.4);
                this.scene.add(ambient);

                const sun = new THREE.DirectionalLight(0xffffff, 0.8);
                sun.position.set(10, 20, 10);
                sun.castShadow = true;
                this.scene.add(sun);
            }

            initLevel() {
                // Grid Floor
                const floorGeo = new THREE.PlaneGeometry(100, 100);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);

                // Placeholder Boxes (A Site)
                for(let i = 0; i < 5; i++) {
                    const box = new THREE.Mesh(
                        new THREE.BoxGeometry(2, 2, 2),
                        new THREE.MeshStandardMaterial({ color: 0x333344 })
                    );
                    box.position.set(Math.random()*20-10, 1, Math.random()*20-10);
                    box.castShadow = true;
                    box.receiveShadow = true;
                    this.scene.add(box);
                }
            }

            initPlayer() {
                this.player = {
                    pos: new THREE.Vector3(0, 1.7, 5),
                    vel: new THREE.Vector3(),
                    onGround: false,
                    isSprinting: false,
                    isSliding: false,
                    slideTimer: 0,
                    yaw: 0,
                    pitch: 0,
                    height: 1.7
                };
                
                this.camera.position.copy(this.player.pos);
                this.keys = {};
                
                // Weapon Placeholder (The Vandal)
                this.weaponPivot = new THREE.Group();
                this.camera.add(this.weaponPivot);
                this.scene.add(this.camera);

                const gunMesh = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 0.15, 0.6),
                    new THREE.MeshStandardMaterial({ color: 0x222222 })
                );
                gunMesh.position.set(0.3, -0.25, -0.5);
                this.weaponPivot.add(gunMesh);
            }

            initEventListeners() {
                document.addEventListener('keydown', (e) => this.keys[e.code] = true);
                document.addEventListener('keyup', (e) => this.keys[e.code] = false);
                document.addEventListener('mousedown', () => {
                    if (document.pointerLockElement !== document.body) {
                        document.body.requestPointerLock();
                    } else {
                        this.shoot();
                    }
                });
                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement === document.body) {
                        this.player.yaw -= e.movementX * CONFIG.MOUSE_SENS;
                        this.player.pitch -= e.movementY * CONFIG.MOUSE_SENS;
                        this.player.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.player.pitch));
                    }
                });
            }

            handleMovement(dt) {
                const p = this.player;
                
                // 1. Rotation
                this.camera.rotation.set(p.pitch, p.yaw, 0, 'YXZ');

                // 2. Input Direction
                let moveDir = new THREE.Vector3();
                if (this.keys['KeyW']) moveDir.z -= 1;
                if (this.keys['KeyS']) moveDir.z += 1;
                if (this.keys['KeyA']) moveDir.x -= 1;
                if (this.keys['KeyD']) moveDir.x += 1;
                moveDir.normalize().applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), p.yaw));

                // 3. Sprinting & Sliding
                p.isSprinting = this.keys['ShiftLeft'] && moveDir.z < 0;
                let targetSpeed = p.isSprinting ? CONFIG.SPRINT_SPEED : CONFIG.WALK_SPEED;

                // Slide Mechanic
                if (this.keys['ControlLeft'] && p.isSprinting && !p.isSliding) {
                    p.isSliding = true;
                    p.slideTimer = 1.5;
                }

                if (p.isSliding) {
                    targetSpeed *= 1.3;
                    p.slideTimer -= dt;
                    if (p.slideTimer <= 0) p.isSliding = false;
                    this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, 105, 0.1);
                } else {
                    this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, 90, 0.1);
                }
                this.camera.updateProjectionMatrix();

                // 4. Physics (Simple friction + Accel)
                const currentPlanarVel = new THREE.Vector3(p.vel.x, 0, p.vel.z);
                if (p.onGround) {
                    p.vel.x -= p.vel.x * CONFIG.FRICTION * dt;
                    p.vel.z -= p.vel.z * CONFIG.FRICTION * dt;
                    p.vel.addScaledVector(moveDir, CONFIG.ACCEL * targetSpeed * dt);
                } else {
                    // Air Control (Quake style)
                    p.vel.addScaledVector(moveDir, CONFIG.ACCEL * 0.2 * dt);
                }

                // 5. Gravity & Jump
                p.vel.y += CONFIG.GRAVITY * dt;
                if (p.onGround && this.keys['Space']) {
                    p.vel.y = CONFIG.JUMP_FORCE;
                    p.onGround = false;
                }

                // 6. Apply Velocity
                p.pos.addScaledVector(p.vel, dt);

                // 7. Ground Collision (Simple Floor)
                if (p.pos.y < 1.7) {
                    p.pos.y = 1.7;
                    p.vel.y = 0;
                    p.onGround = true;
                }

                this.camera.position.copy(p.pos);
                
                // 8. Procedural Sway/Bob
                const speed = currentPlanarVel.length();
                const bob = Math.sin(Date.now() * 0.01) * (speed * 0.01);
                this.weaponPivot.position.y = -bob * 0.5;
                this.weaponPivot.position.x = Math.cos(Date.now() * 0.005) * (speed * 0.005);
            }

            shoot() {
                // Raycasting for hits
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera({ x: 0, y: 0 }, this.camera);
                
                const intersects = raycaster.intersectObjects(this.scene.children);
                if (intersects.length > 0) {
                    this.createImpact(intersects[0].point);
                }

                // Visual Recoil
                this.player.pitch += 0.02; // Simple kick
                
                // Muzzle Flash Placeholder
                console.log("BANG!");
            }

            createImpact(pos) {
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.05),
                    new THREE.MeshBasicMaterial({ color: 0xffff00 })
                );
                dot.position.copy(pos);
                this.scene.add(dot);
                setTimeout(() => this.scene.remove(dot), 2000);
            }

            gameLoop() {
                requestAnimationFrame(() => this.gameLoop());
                const dt = Math.min(this.clock.getDelta(), 0.1);
                
                this.handleMovement(dt);
                
                // Debug Info
                document.getElementById('debug').innerText = 
                    `FPS: ${Math.round(1/dt)} | POS: ${this.player.pos.x.toFixed(1)}, ${this.player.pos.y.toFixed(1)}, ${this.player.pos.z.toFixed(1)}`;
                
                this.renderer.render(this.scene, this.camera);
            }
        }

        // Initialize Engine
        const Game = new AscentEngine();
    </script>
</body>
</html>
